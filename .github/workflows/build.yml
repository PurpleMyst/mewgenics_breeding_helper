name: Build Windows Executable

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Build executable
        run: uv run pyinstaller MewgenicsBreedingHelper.spec --noconfirm

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MewgenicsBreedingHelper-${{ github.sha }}
          path: dist/MewgenicsBreedingHelper.exe
          retention-days: 7

      - name: Attach exe to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MewgenicsBreedingHelper.exe
