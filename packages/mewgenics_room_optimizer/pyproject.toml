[project]
name = "mewgenics_room_optimizer"
version = "1.0.0"
description = "Room optimization logic for Mewgenics breeding"
requires-python = ">=3.13"
dependencies = [
    "mewgenics_breeding",
    "mewgenics_parser",
    "mewgenics_scorer",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-mock>=3.13",
    "inline-snapshot>=0.6",
]

[dependency-groups]
dev = [
    "dirty-equals>=0.11",
]

[tool.inline-snapshot]
format-command="ruff format --stdin-filename {filename}"
