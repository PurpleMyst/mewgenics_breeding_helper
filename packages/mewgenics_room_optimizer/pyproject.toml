[project]
name = "mewgenics_room_optimizer"
version = "0.1.0"
description = "Room optimization logic for Mewgenics breeding"
requires-python = ">=3.14"
dependencies = [
    "mewgenics_parser",
    "mewgenics_scorer",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-mock>=3.14",
    "inline-snapshot>=0.6",
]

[dependency-groups]
dev = [
    "dirty-equals>=0.11",
]
