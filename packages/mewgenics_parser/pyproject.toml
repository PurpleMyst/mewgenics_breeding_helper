[project]
name = "mewgenics_parser"
version = "0.1.0"
description = "Package for parsing Mewgenics save files and related data."
requires-python = ">=3.14"
dependencies = [
    "lz4>=4.4.5",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "inline-snapshot>=0.6",
    "dirty-equals>=0.1",
]

[dependency-groups]
dev = [
    "beautifulsoup4>=4.14.3",
    "requests>=2.32.5",
]

[project.scripts]
extract-gpak = "mewgenics_parser:_extract_gpak_script"

[tool.inline-snapshot]
format-command="ruff format --stdin-filename {filename}"
