[project]
name = "mewgenics_room_optimizer_ui"
version = "1.0.0"
description = "DearPyGui UI for room optimization"
requires-python = ">=3.13"
dependencies = [
    "mewgenics_parser",
    "mewgenics_scorer",
    "mewgenics_room_optimizer",
    "dearpygui>=1.6",
    "platformdirs>=4.9.4",
    "pydantic>=2.12.5",
]

[project.scripts]
room-optimizer = "mewgenics_room_optimizer_ui.app:main"

[tool.inline-snapshot]
format-command="ruff format --stdin-filename {filename}"

[dependency-groups]
dev = [
    "pyinstaller>=6.19.0",
]
