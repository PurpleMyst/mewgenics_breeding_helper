[project]
name = "mewgenics_scorer"
version = "1.0.0"
description = "Pair scoring factors for Mewgenics breeding optimization"
requires-python = ">=3.13"
dependencies = [
    "mewgenics-breeding",
    "mewgenics_parser",
]

[tool.uv.sources]
mewgenics_parser = { workspace = true }
mewgenics-breeding = { workspace = true }

[tool.inline-snapshot]
format-command="ruff format --stdin-filename {filename}"
